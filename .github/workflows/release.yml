name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build CLI Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build release archives
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "1"
        run: VERSION="${GITHUB_REF_NAME}" scripts/package_release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cli-release
          path: |
            dist/skirk-*.tar.gz
            dist/skirk-*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  android:
    name: Validate Android Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"

      - name: Build debug APK
        working-directory: clients/android
        run: ./gradlew :app:assembleDebug -Pskirk.version="${GITHUB_REF_NAME#v}" --console=plain

      - name: Prepare Android release APK
        run: |
          mkdir -p dist/android
          cp clients/android/app/build/outputs/apk/debug/app-debug.apk dist/android/skirk-android-arm64.apk
          sha256sum dist/android/skirk-android-arm64.apk > dist/android/skirk-android-arm64.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            dist/android/skirk-android-arm64.apk
            dist/android/skirk-android-arm64.apk.sha256
          if-no-files-found: error

  windows-desktop:
    name: Build Windows Desktop Client
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Skirk Windows sidecar
        shell: pwsh
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "1"
        run: |
          New-Item -ItemType Directory -Force clients/desktop/src-tauri/resources/sidecars/windows | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $commit = "${env:GITHUB_SHA}".Substring(0, 7)
          $ldflags = "-s -w -X main.version=${env:GITHUB_REF_NAME} -X main.commit=$commit -X main.date=$date"
          if ($env:SKIRK_REQUIRE_BUILTIN_OAUTH -eq "1" -and (-not $env:SKIRK_OAUTH_CLIENT_ID -or -not $env:SKIRK_OAUTH_CLIENT_SECRET)) {
            throw "release builds require SKIRK_OAUTH_CLIENT_ID and SKIRK_OAUTH_CLIENT_SECRET"
          }
          if ($env:SKIRK_OAUTH_CLIENT_ID -or $env:SKIRK_OAUTH_CLIENT_SECRET) {
            if (-not $env:SKIRK_OAUTH_CLIENT_ID -or -not $env:SKIRK_OAUTH_CLIENT_SECRET) {
              throw "SKIRK_OAUTH_CLIENT_ID and SKIRK_OAUTH_CLIENT_SECRET must be set together"
            }
            $ldflags = "$ldflags -X main.defaultOAuthClientID=$env:SKIRK_OAUTH_CLIENT_ID -X main.defaultOAuthClientSecret=$env:SKIRK_OAUTH_CLIENT_SECRET"
          }
          go build -trimpath -ldflags "$ldflags" -o clients/desktop/src-tauri/resources/sidecars/windows/skirk-sidecar.exe ./cmd/skirk

      - name: Build Tauri desktop app
        working-directory: clients/desktop
        run: |
          npm ci
          npm run tauri build -- --no-bundle

      - name: Build portable zip
        run: python clients/desktop/scripts/package_windows_portable.py

      - name: Prepare Windows release checksums
        shell: pwsh
        run: |
          $zip = "dist/windows-portable/Skirk_windows_x64_portable.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zip -Leaf)" | Set-Content "$zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-release
          path: |
            dist/windows-portable/Skirk_windows_x64_portable.zip
            dist/windows-portable/Skirk_windows_x64_portable.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release
      - android
      - windows-desktop
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find dist-release -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          release_notes=$'Assets:\n- Skirk_windows_x64_portable.zip: Windows GUI portable app. Extract it and open Skirk.exe.\n- skirk-windows-amd64.zip: Windows CLI-only build for PowerShell/manual use.\n'
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --notes "$release_notes"
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --title "${GITHUB_REF_NAME}" --generate-notes --notes "$release_notes"
          fi
